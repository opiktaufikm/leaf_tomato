    sdk: flutter
  cupertino_icons: ^1.0.6

  # ── Image input ─────────────────────────────────────────────────────────────
  image_picker: ^1.0.7        # camera & gallery picker
  camera: ^0.10.5+9           # live camera preview
  image: ^4.1.7               # image processing helpers

  # ── ML inference ────────────────────────────────────────────────────────────
